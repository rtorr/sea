version: 2

project_name: sea

builds:
  - id: sea
    main: ./cmd/sea
    binary: sea
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/rtorr/sea/internal/cli.version={{.Version}}

archives:
  - id: default
    format: tar.gz
    name_template: "sea-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc

release:
  github:
    owner: rtorr
    name: sea
